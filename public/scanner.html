<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
        />
        <title>AR Maintenance // Scanner</title>
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body class="scene">
        <div id="scene">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="frame"></canvas>
            <canvas id="overlay"></canvas>

            <!-- Top HUD bar -->
            <div id="scanner-bar">
                <div class="left">
                    <button class="scanner-back-btn" onclick="history.back()">&#8592; Back</button>
                    <span class="pulse"></span>
                    <span>AR Maint // Live</span>
                    <span id="status-text">SCANNING</span>
                </div>
                <div class="right">
                    <a href="/dashboard.html">Dashboard</a>
                    <span data-user-widget></span>
                </div>
            </div>

            <!-- Scanning reticle, shown while no QR is locked -->
            <div id="reticle">
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
            </div>
            <div id="hint">ALIGN QR MARKER WITHIN FRAME</div>

            <!-- Fault detail panel, slides up once a QR is identified -->
            <div id="detail-panel" class="detail-panel hidden">
                <div class="dp-header">
                    <div class="dp-id-row">
                        <span class="dp-id" id="dp-id">-</span>
                        <span class="dp-status-badge" id="dp-status-badge">OPEN</span>
                        <span class="dp-priority-badge" id="dp-priority-badge">HIGH</span>
                    </div>
                    <button class="dp-dismiss-btn" id="dp-dismiss-btn" title="Dismiss">&#10005;</button>
                </div>

                <div class="dp-body">
                    <!-- Reference image -->
                    <div class="dp-image-col">
                        <img class="dp-image" id="dp-image" src="" alt="Component reference" />
                        <div class="dp-image-label">COMPONENT REFERENCE</div>
                    </div>

                    <!-- Fault details -->
                    <div class="dp-info-col">
                        <div class="dp-title" id="dp-title">-</div>
                        <div class="dp-location" id="dp-location">-</div>
                        <div class="dp-desc" id="dp-desc">-</div>
                        <div class="dp-component" id="dp-component">-</div>

                        <!-- SWE-04: Annotation -->
                        <div class="dp-notes-section" id="dp-notes-section">
                            <div class="dp-notes-list" id="dp-notes-list"></div>
                            <div class="dp-note-form hidden" id="dp-note-form">
                                <textarea id="dp-note-input" class="dp-note-input" placeholder="Enter site observation..." rows="2" maxlength="300"></textarea>
                                <div class="dp-note-actions">
                                    <button class="btn btn-sm" id="dp-note-submit">&#43;&nbsp; Save Note</button>
                                    <button class="btn secondary btn-sm" id="dp-note-cancel">Cancel</button>
                                </div>
                                <div class="dp-note-status hidden" id="dp-note-status"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dp-footer">
                    <button class="btn secondary btn-sm dp-annotate-btn" id="dp-annotate-btn">&#43;&nbsp; Add Note</button>
                    <button class="btn dp-fix-btn" id="dp-fix-btn">
                        &#9655;&nbsp; Mark as Fixed
                    </button>
                </div>
            </div>

            <!-- Initial camera permission gate -->
            <div id="gate">
                <h1>AR Scanner Ready</h1>
                <p>Grant camera access to begin scanning fault markers.</p>
                <div class="gate-actions">
                    <button class="btn secondary" onclick="history.back()">&#8592; Back</button>
                    <button class="btn" id="start-btn">Start Camera</button>
                </div>
                <small id="gate-error"></small>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
        <script src="/js/auth.js"></script>
        <script src="/js/scanner.js"></script>
    </body>
</html>
