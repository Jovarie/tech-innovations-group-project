<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#02080d"/>

  <!-- Tunnel arch outer wall -->
  <path d="M18,115 L18,72 Q100,8 182,72 L182,115" fill="rgba(0,240,255,0.04)" stroke="#4ec9d6" stroke-width="2" opacity="0.75"/>
  <!-- Tunnel arch inner wall (lining thickness) -->
  <path d="M30,115 L30,74 Q100,22 170,74 L170,115" fill="rgba(0,240,255,0.03)" stroke="#4ec9d6" stroke-width="1" opacity="0.4"/>

  <!-- Lining segment joints -->
  <line x1="30"  y1="90" x2="18"  y2="88" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>
  <line x1="36"  y1="70" x2="26"  y2="65" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>
  <line x1="170" y1="90" x2="182" y2="88" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>
  <line x1="164" y1="70" x2="174" y2="65" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>
  <line x1="68"  y1="23" x2="65"  y2="13" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>
  <line x1="132" y1="23" x2="135" y2="13" stroke="#4ec9d6" stroke-width="0.7" opacity="0.3"/>

  <!-- Hairline crack - main -->
  <path d="M97,10 L94,22 L99,32 L95,45 L92,58 L96,65" fill="none" stroke="#ff4d6d" stroke-width="1.8"/>
  <!-- Crack branch -->
  <path d="M95,45 L89,52" fill="none" stroke="#ff4d6d" stroke-width="1"/>

  <!-- Crack highlight box -->
  <rect x="83" y="8" width="22" height="30" fill="rgba(255,77,109,0.06)" stroke="#ff4d6d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="94" y="5" fill="#ff4d6d" font-family="Courier New" font-size="6" text-anchor="middle" letter-spacing="1">CRACK</text>

  <!-- Water ingress droplets -->
  <ellipse cx="90" cy="70" rx="2.5" ry="3.5" fill="#00f0ff" opacity="0.7"/>
  <ellipse cx="97" cy="75" rx="2"   ry="3"   fill="#00f0ff" opacity="0.55"/>
  <ellipse cx="85" cy="77" rx="1.8" ry="2.5" fill="#00f0ff" opacity="0.45"/>

  <!-- Floor / track bed -->
  <line x1="18" y1="115" x2="182" y2="115" stroke="#4ec9d6" stroke-width="1.2" opacity="0.5"/>

  <!-- Rail sleepers -->
  <line x1="55" y1="115" x2="55" y2="122" stroke="#ffcc00" stroke-width="2"/>
  <line x1="85" y1="115" x2="85" y2="122" stroke="#ffcc00" stroke-width="2"/>
  <line x1="115" y1="115" x2="115" y2="122" stroke="#ffcc00" stroke-width="2"/>
  <line x1="145" y1="115" x2="145" y2="122" stroke="#ffcc00" stroke-width="2"/>
  <!-- Rail lines -->
  <line x1="40" y1="119" x2="160" y2="119" stroke="#ffcc00" stroke-width="1.2" opacity="0.55"/>
  <line x1="40" y1="122" x2="160" y2="122" stroke="#ffcc00" stroke-width="1.2" opacity="0.55"/>

  <!-- Label -->
  <text x="100" y="134" fill="#4ec9d6" font-family="Courier New" font-size="9" text-anchor="middle" letter-spacing="3">TUNNEL LINING</text>
</svg>
