<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#02080d"/>

  <!-- Outer insulation jacket -->
  <rect x="15" y="45" width="170" height="50" rx="25" fill="rgba(0,240,255,0.05)" stroke="#4ec9d6" stroke-width="1.5"/>

  <!-- Inner conductor core -->
  <rect x="28" y="57" width="144" height="26" rx="13" fill="rgba(255,204,0,0.08)" stroke="#ffcc00" stroke-width="1" opacity="0.8"/>
  <!-- Core strands -->
  <line x1="35"  y1="70" x2="165" y2="70" stroke="#ffcc00" stroke-width="2.5" opacity="0.5" stroke-dasharray="8,4"/>

  <!-- End connectors -->
  <rect x="8"  y="50" width="10" height="40" rx="2" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="1.5"/>
  <rect x="182" y="50" width="10" height="40" rx="2" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="1.5"/>

  <!-- Cracking / wear marks on top insulation -->
  <line x1="68" y1="45" x2="63" y2="53" stroke="#ff4d6d" stroke-width="2"/>
  <line x1="78" y1="44" x2="75" y2="51" stroke="#ff4d6d" stroke-width="1.5"/>
  <line x1="88" y1="45" x2="84" y2="52" stroke="#ff4d6d" stroke-width="2"/>
  <line x1="73" y1="44" x2="71" y2="50" stroke="#ff4d6d" stroke-width="1"/>

  <!-- Wear marks on bottom insulation -->
  <line x1="95"  y1="95" x2="99"  y2="88" stroke="#ff4d6d" stroke-width="1.5"/>
  <line x1="107" y1="95" x2="110" y2="89" stroke="#ff4d6d" stroke-width="2"/>
  <line x1="118" y1="95" x2="120" y2="90" stroke="#ff4d6d" stroke-width="1.5"/>

  <!-- Exposed insulation patch (damage zone highlight) -->
  <rect x="62" y="44" width="34" height="12" fill="rgba(255,77,109,0.08)" stroke="#ff4d6d" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Damage label -->
  <text x="79" y="38" fill="#ff4d6d" font-family="Courier New" font-size="7" text-anchor="middle" letter-spacing="1">WEAR ZONE</text>
  <line x1="79" y1="40" x2="79" y2="44" stroke="#ff4d6d" stroke-width="0.8"/>

  <!-- Bottom label -->
  <text x="100" y="125" fill="#4ec9d6" font-family="Courier New" font-size="9" text-anchor="middle" letter-spacing="3">TRACTION FEEDER CABLE</text>
</svg>
